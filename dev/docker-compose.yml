# Development environment for Frappe + ERPNext (v16)
# Based on the official frappe_docker devcontainer setup, adapted for a meta-repo + submodules.
#
# How it works:
# - The frappe container (image frappe/bench:latest) ships the bench CLI + Python/Node.
# - The whole repo is mounted at /workspace so apps/frappe and apps/erpnext (submodules)
#   can be edited live from the host.
# - mariadb + redis run in their own containers.
# - The bench directory (frappe-bench/) is created inside /workspace (gitignored); its apps
#   symlink back to the submodules so source edits take effect immediately.

services:
  mariadb:
    image: docker.io/mariadb:11.8
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: 123
      MARIADB_AUTO_UPGRADE: 1
    volumes:
      - mariadb-data:/var/lib/mysql
    ports:
      - "3306:3306"

  redis-cache:
    image: docker.io/redis:alpine

  redis-queue:
    image: docker.io/redis:alpine

  frappe:
    image: docker.io/frappe/bench:latest
    command: sleep infinity
    environment:
      - SHELL=/bin/bash
    volumes:
      # Mount the whole repo at /workspace (apps/ submodules become editable live)
      - ..:/workspace:cached
      # (optional) share SSH credentials so bench get-app works with private repos
      # - ${HOME}/.ssh:/home/frappe/.ssh:cached
    working_dir: /workspace
    ports:
      - "8000-8005:8000-8005"
      - "9000-9005:9000-9005"
    depends_on:
      - mariadb
      - redis-cache
      - redis-queue

volumes:
  mariadb-data:
