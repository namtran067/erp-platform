name: Build and Push ERP Image

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the GitHub UI

env:
  REGISTRY: ghcr.io
  # Note: github.repository is typically 'username/repo-name'
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: self-hosted # <--- Targets your local Mac or VPS runner
    
    # Grant permissions to the default GITHUB_TOKEN to push the image to GHCR (Packages)
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build the Docker Image
        run: |
          # Set the Image name according to GHCR standards
          # Use 'tr' to ensure IMAGE_NAME is strictly lowercase as required by Docker
          LOWER_IMAGE_NAME=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          export IMAGE="${{ env.REGISTRY }}/$LOWER_IMAGE_NAME/my-erpnext"
          export TAG="latest"
          
          echo "Starting to build image: $IMAGE:$TAG"
          
          # Grant execution permissions to the build script
          chmod +x scripts/build-prod.sh
          
          # Execute the Frappe build script
          ./scripts/build-prod.sh
          
      - name: Push the Docker Image to GHCR
        run: |
          LOWER_IMAGE_NAME=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          export IMAGE="${{ env.REGISTRY }}/$LOWER_IMAGE_NAME/my-erpnext"
          export TAG="latest"
          
          echo "Pushing image $IMAGE:$TAG to GHCR..."
          docker push "$IMAGE:$TAG"
